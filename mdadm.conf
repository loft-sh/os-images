# Generic mdraid scan stub: no arrays are baked into the image, so it can host
# arrays created later at provision time.
#
# HOMEHOST <ignore> + AUTO +all assemble every array by policy regardless of its
# homehost. The arrays are created at provision time (ironic) with homehost
# "localhost.localdomain"; with the default HOMEHOST <system> the initramfs treats
# them as foreign and refuses to auto-assemble, so the root device never appears
# and boot drops to an initramfs shell.

HOMEHOST <ignore>
AUTO +all
MAILADDR root
